<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Dashboard</title>

 <script src="https://cdn.tailwindcss.com"></script>

 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap">

<link rel="stylesheet" href="./css/style.css">

</head>

<body class="bg-gray-100 font-[Geist]">

 
<nav class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="./assets/github-logo.png" class="w-8">

<h1 class="text-lg font-semibold">
GitHub Issues Tracker
</h1>

</div>

<div class="flex gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded-md px-3 py-2 text-sm w-64 focus:outline-none"
/>

<button
class="text-white px-4 py-2 rounded-md text-sm hover:opacity-90"
style="background:#4A00FF"
>
Search
</button>

</div>

</div>

</nav>



 
<div class="max-w-7xl mx-auto px-6 mt-8">

<h2 class="text-xl font-semibold mb-4">
All Issues
</h2>


<!-- TAB SECTION -->

<div class="bg-white p-4 rounded-lg shadow-sm mb-6">

<div class="flex gap-3">

<button
id="tab-all"
class="tab-btn px-4 py-2 rounded-md text-sm text-white"
style="background:#4A00FF"
>
All
</button>

<button
id="tab-open"
class="tab-btn px-4 py-2 rounded-md text-sm border hover:bg-gray-100"
>
Open
</button>

<button
id="tab-closed"
class="tab-btn px-4 py-2 rounded-md text-sm border hover:bg-gray-100"
>
Closed
</button>

</div>

</div>



<!-- iussue content -->
<div class="bg-white p-6 rounded-lg shadow-sm mb-6 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="./assets/Aperture.png" class="w-8">

<div>

<h3 id="issue-count" class="text-lg font-semibold">
0 Issues
</h3>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>


<div class="flex items-center gap-4 text-sm">

<div class="flex items-center gap-2">

<div class="w-3 h-3 bg-green-500 rounded-full"></div>
<span>Open</span>

</div>


<div class="flex items-center gap-2">

<div class="w-3 h-3 bg-purple-500 rounded-full"></div>
<span>Closed</span>

</div>

</div>

</div>



 
<!-- <div
id="issues-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-6"
>
</div> -->
 
<div id="loading-spinner" class="text-center py-10 hidden">

<div class="inline-block w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>

</div>

<div
id="issues-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-6"
>
</div>


</div>

<!-- now adding the modal  -->
 <!-- MODAL -->

<!-- MODAL -->

<div
id="issue-modal"
class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50"
>

<div class="bg-white w-[640px] rounded-xl p-8 shadow-lg">

<!-- TITLE -->

<h2 id="modal-title" class="text-2xl font-semibold mb-4"></h2>

<!-- STATUS LINE -->

<div class="flex items-center gap-3 text-sm text-gray-500 mb-5">

<span
id="modal-status"
class="px-3 py-1 rounded-full text-white text-xs"
></span>

<span class="text-gray-400">•</span>

<span id="modal-author"></span>

<span class="text-gray-400">•</span>

<span id="modal-date"></span>

</div>

<!-- LABELS -->

<div id="modal-labels" class="flex gap-3 mb-6"></div>

<!-- DESCRIPTION -->

<p id="modal-description" class="text-gray-600 mb-8 leading-relaxed"></p>

<!-- ASSIGNEE + PRIORITY -->

<div class="flex justify-between bg-gray-100 rounded-lg p-5 mb-6">

<div>

<p class="text-gray-500 text-sm mb-1">
Assignee:
</p>

<p id="modal-assignee" class="font-semibold"></p>

</div>

<div>

<p class="text-gray-500 text-sm mb-1">
Priority:
</p>

<span id="modal-priority"></span>

</div>

</div>

<!-- CLOSE BUTTON -->

<div class="flex justify-end">

<button
onclick="closeModal()"
class="px-5 py-2 rounded-md text-white font-medium"
style="background:#4A00FF"
>
Close
</button>

</div>

</div>

</div>

 <!-- ----------------- -->

<script src="./js/app.js"></script>

</body>
</html>
