<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Dashboard</title>

 <script src="https://cdn.tailwindcss.com"></script>

 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap">

<link rel="stylesheet" href="./css/style.css">

</head>

<body class="bg-gray-100 font-[Geist]">

 
<nav class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="./assets/github-logo.png" class="w-8">

<h1 class="text-lg font-semibold">
GitHub Issues Tracker
</h1>

</div>

<div class="flex gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded-md px-3 py-2 text-sm w-64 focus:outline-none"
/>

<button
class="text-white px-4 py-2 rounded-md text-sm hover:opacity-90"
style="background:#4A00FF"
>
Search
</button>

</div>

</div>

</nav>



 
<div class="max-w-7xl mx-auto px-6 mt-8">

<h2 class="text-xl font-semibold mb-4">
All Issues
</h2>


<!-- TAB SECTION -->

<div class="bg-white p-4 rounded-lg shadow-sm mb-6">

<div class="flex gap-3">

<button
class="px-4 py-2 rounded-md text-sm text-white"
style="background:#4A00FF"
>
All
</button>

<button
class="px-4 py-2 rounded-md text-sm border hover:bg-gray-100"
>
Open
</button>

<button
class="px-4 py-2 rounded-md text-sm border hover:bg-gray-100"
>
Closed
</button>

</div>

</div>



<!-- iussue content -->
<div class="bg-white p-6 rounded-lg shadow-sm mb-6 flex justify-between items-center">

<div class="flex items-center gap-3">

<img src="./assets/Aperture.png" class="w-8">

<div>

<h3 class="text-lg font-semibold">
50 Issues
</h3>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>

</div>

</div>


<div class="flex items-center gap-4 text-sm">

<div class="flex items-center gap-2">

<div class="w-3 h-3 bg-green-500 rounded-full"></div>
<span>Open</span>

</div>


<div class="flex items-center gap-2">

<div class="w-3 h-3 bg-purple-500 rounded-full"></div>
<span>Closed</span>

</div>

</div>

</div>



 

<div
id="issues-container"
class="grid grid-cols-4 gap-6"
>
 

</div>

<script src="./js/app.js"></script>

</body>
</html>
